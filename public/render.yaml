# Optional: Render Blueprint for one-click setup.
# Commit this file and use "New + > Blueprint" in the Render dashboard.
services:
  - type: web
    name: render-sample-site
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20
